services:
  - type: web
    name: trend-intelligence-api
    runtime: python

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: GROQ_API_KEY
        sync: false

      - key: GITHUB_TOKEN
        sync: false

      - key: NEWSAPI_KEY
        sync: false

      - key: DEVTO_API
        sync: false

      - key: RESEND_API_KEY
        sync: false

      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev

      - key: LANGSEARCH_API_KEY
        sync: false

      - key: ADMIN_EMAIL
        value: durgaharshithpigili@gmail.com

      - key: JWT_SECRET
        sync: false

      - key: INTERNAL_SECRET
        sync: false

      - key: REDIS_URL
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: FRONTEND_URL
        value: https://your-vercel-domain.vercel.app

      - key: PYTHON_VERSION
        value: 3.11

    healthCheckPath: /health

    autoDeploy: true